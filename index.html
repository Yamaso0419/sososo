<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ヤンキーから逃げろ！</title>
<style>
body{
    text-align:center;
    background:#222;
    color:white;
    font-family:sans-serif;
}
canvas{
    background:#333;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>ヤンキーから逃げろ！</h1>
<p>矢印キーで逃げろ！捕まったらゲームオーバー</p>
<p id="score">時間: 0</p>

<canvas id="game" width="600" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {x:100,y:100,size:20,speed:4};
let yankee = {x:500,y:300,size:25,speed:2};

let keys = {};
let score = 0;
let gameOver = false;

document.addEventListener("keydown",e=>{
    keys[e.key] = true;
});

document.addEventListener("keyup",e=>{
    keys[e.key] = false;
});

function update(){

if(gameOver) return;

// プレイヤー移動
if(keys["ArrowUp"]) player.y -= player.speed;
if(keys["ArrowDown"]) player.y += player.speed;
if(keys["ArrowLeft"]) player.x -= player.speed;
if(keys["ArrowRight"]) player.x += player.speed;

// 画面外防止
player.x = Math.max(0,Math.min(canvas.width-player.size,player.x));
player.y = Math.max(0,Math.min(canvas.height-player.size,player.y));

// ヤンキー追跡AI
let dx = player.x - yankee.x;
let dy = player.y - yankee.y;
let dist = Math.sqrt(dx*dx + dy*dy);

yankee.x += (dx/dist) * yankee.speed;
yankee.y += (dy/dist) * yankee.speed;

// 当たり判定
if(dist < player.size){
    gameOver = true;
    alert("ゲームオーバー！ 生存時間: "+score);
}

// スコア
score++;
document.getElementById("score").innerText = "時間: " + score;

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// プレイヤー
ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,player.size,player.size);

// ヤンキー
ctx.fillStyle="red";
ctx.fillRect(yankee.x,yankee.y,yankee.size,yankee.size);

}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
